name: Deploy Strapi 

on:
  push:
    branches: [develop]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Docker login
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      - name: Build and push Docker image
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/strapi-a3 \
          --build-arg APP_KEYS="${{ secrets.APP_KEYS }}" \
          --build-arg API_TOKEN_SALT="${{ secrets.API_TOKEN_SALT }}" \
          --build-arg ADMIN_JWT_SECRET="${{ secrets.ADMIN_JWT_SECRET }}" \
          --build-arg JWT_SECRET="${{ secrets.JWT_SECRET }}" \
          --build-arg DATABASE_FILENAME="${{ secrets.DATABASE_FILENAME }}" .
          
          docker push ${{ secrets.DOCKER_USERNAME }}/strapi-a3

      - name: Terraform apply
        run: terraform apply -auto-approve \
          -var="image_url=${{ secrets.DOCKER_USERNAME }}/strapi-a3" \
          -var="execution_role_arn=${{ secrets.ECS_EXECUTION_ROLE }}" \
          -var="task_role_arn=${{ secrets.ECS_TASK_ROLE }}" \
          -var="subnet_ids=${{ secrets.SUBNET_IDS }}" \
          -var="security_group_id=${{ secrets.SECURITY_GROUP_ID }}"
        working-directory: terraform
      