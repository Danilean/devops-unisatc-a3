name: pull_request_tests

on:
  pull_request:
    branches: [develop, master]

jobs:
  e2e-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: Install pnpm
        run: npm install -g pnpm

      - name: Install dependencies
        run: pnpm install

      - name: Definir variáveis de ambiente
        run: |
          echo "APP_KEYS=${{ secrets.APP_KEYS }}" >> .env
          echo "API_TOKEN_SALT=${{ secrets.API_TOKEN_SALT }}" >> .env
          echo "ADMIN_JWT_SECRET=${{ secrets.ADMIN_JWT_SECRET }}" >> .env
          echo "TRANSFER_TOKEN_SALT=${{ secrets.TRANSFER_TOKEN_SALT }}" >> .env
          echo "JWT_SECRET=${{ secrets.JWT_SECRET }}" >> .env
          echo "DATABASE_FILENAME=${{ secrets.DATABASE_FILENAME }}" >> .env

      - name: Build Strapi
        run: pnpm build

      - name: Start Strapi
        env:
          HOST: 0.0.0.0
          PORT: 1337
          APP_KEYS: ImJMpHjnCdJw4ii7jZzCXQ==,Jg239VoMach6Fh2LAH6ydA==,LAdmPTwE8oqyVjAV4pCkBQ==,f1gPGngKmE5xhyDktSpCVw==
          ADMIN_JWT_SECRET: deEi8rGl7WB43uXiaYPaOg==
          JWT_SECRET: U2Nh9O8oDdw6gzXqWbg5Eg==
          API_TOKEN_SALT: X2d0C6rgXwWgwEZCslZN0A==
          DATABASE_FILENAME: .tmp/data.db
        run: |
          pnpm develop &
          n=0
          until curl --fail http://localhost:1337; do
            n=$((n+1))
            if [ $n -ge 80 ]; then
              echo "Strapi não iniciou no tempo esperado" && exit 1
            fi
            sleep 5
          done

      - name: Install Playwright browsers
        run: pnpm exec playwright install

      - name: Run Playwright tests
        run: pnpm exec playwright test
